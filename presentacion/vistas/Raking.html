<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puntajes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">

    <!-- Estilos del juego (mismo look que el mapa) -->
    <link rel="stylesheet" href="../estilos/styles.css">
    <link rel="stylesheet" href="../estilos/game_extra.css">

    <!-- Modelo + controlador -->
    <script defer src="../../modelos/Raking.js"></script>
    <script defer src="../../negocio/raking_controller.js"></script>

    <!-- Bootstrap JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
</head>
<body>

<div id="Container" class="container-fluid p-2">
    <div class="row g-0">

        <!-- Sidebar izquierdo (mismo estilo) -->
        <div class="col-auto sidebar-left px-0 d-flex flex-column gap-2">
            <div class="p-2" id="ranking-panel">
                <div class="d-flex align-items-center justify-content-between">
                    <h5 class="mb-0">Puntajes</h5>
                    <a href="game.html" class="btn btn-sm btn-outline-light">Volver</a>
                </div>
                <div class="text-light" style="font-size:12px;opacity:.85;">
                    Top 10 de jugadores guardado en localStorage
                </div>
            </div>

            <div class="p-2">
                <div id="ranking-empty" class="alert alert-secondary py-2 px-2 mb-0" style="display:none;">
                    No hay puntajes guardados todavía.
                </div>
                <div id="ranking-list" class="d-flex flex-column gap-2"></div>
            </div>
        </div>

        <!-- Columna central (solo para mantener layout) -->
        <div class="col px-0">
            <div class="p-3">
                <div class="card bg-dark text-light">
                    <div class="card-body">
                        <h6 class="card-title">¿Qué se muestra aquí?</h6>
                        <p class="card-text mb-0" style="font-size:13px;opacity:.9;">
                            Esta pantalla lee el ranking desde <code>localStorage</code> (key <code>ranking</code>)
                            y renderiza tarjetas con la información de cada jugador.
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
