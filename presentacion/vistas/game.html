<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../estilos/styles.css">
    <script defer src="../../modelos/Grid.js" defer></script>
    <script defer src="../../negocio/Map.js" defer></script>
    <script defer src="../../modelos/Cell.js" defer></script>
    <script defer src = "../../acceso_a_datos/StorageService.js"></script>
    <script defer src="../../modelos/City.js"></script>
    <script defer src="../../modelos/Climate.js"></script>
    <Script defer src="../../modelos/News.js"></SCript>
    <Script defer src="../../acceso_a_datos/NewsService.js"></SCript>
    <script defer src="../../acceso_a_datos/ApiClimate.js"></script>

    <!-- Bootstrap JS (necesario para que funcione el accordion/collapse) -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</head>
<body>
        <div  id = "Container" class="container-fluid p-2">
            <div class="row g-0">
                <div class="col-auto sidebar-left px-0 d-flex flex-column gap-3">
                    <div id="city-panel" class="p-2">
                        <h5>City Information</h5>
                        <div id="city-info"></div>
                    </div>
                    <div class="accordion" id="building-accordion">

                        <div class="accordion-item">
                            
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseBuildings">
                                    <img src="../../recourses/martillos.png" class="building-img-header">
                                </button>
                            </h2>

                            <div id="collapseBuildings" class="accordion-collapse collapse show">
                    
                                <div class="accordion-body">

                                    <div id="building-list" class="d-flex flex-column gap-2">

                                        <!-- Items (recourses) -->
                                         

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/bombero.png" class="building-img">
                                            <span class="building-name">Bombero</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/camino.png" class="building-img">
                                            <span class="building-name">Camino</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/casa.png" class="building-img">
                                            <span class="building-name">Casa</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/centro-comercial.png" class="building-img">
                                            <span class="building-name">Centro Comercial</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/estacion-de-policia.png" class="building-img">
                                            <span class="building-name">Estacion De Policia</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/fabrica-electrica.png" class="building-img">
                                            <span class="building-name">Fabrica Electrica</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/filtro-de-agua.png" class="building-img">
                                            <span class="building-name">Filtro De Agua</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/granja.png" class="building-img">
                                            <span class="building-name">Granja</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/hospital.png" class="building-img">
                                            <span class="building-name">Hospital</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/naturaleza.png" class="building-img">
                                            <span class="building-name">Naturaleza</span>
                                        </div>

                                        <div class="building-item d-flex align-items-center gap-3 p-2">
                                            <img src="../../recourses/tienda.png" class="building-img">
                                            <span class="building-name">Tienda</span>
                                        </div>

                                    </div>

                                </div>
                            </div>

                        </div>

                    </div>

                </div>
                <div id="map-col" class="col px-0">
                    <div class="container-fluid px-0">
                        <div id="map-viewport" class="w-100 overflow-auto">
                            <div class="map-container" id="id_city"></div>
                        </div>
                        <div class="row zoom-controls g-0 p-2 ">
                            <div class="col">
                                <button id = "zoom-in" class="btn btn-dark w-100">+</button>
                            </div>
                            <div class="col">
                                <button id = "zoom-out" class="btn btn-dark w-100">-</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-auto sidebar-right px-0 d-flex flex-column gap-3">
                    <div id = "weather-panel" class = "panel flex-grow-1 p-2">
                        <div id = "weather-info"></div>
                    </div>
                    <div class = "panel flex-grow-1 p-2">
                        <div id = "news"></div>
                    </div>
                </div>   
            </div>
            
        </div>

    </body>
</html>
