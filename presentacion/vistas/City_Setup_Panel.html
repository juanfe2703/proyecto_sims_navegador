<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/stye_Setup_panel.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">

    <!-- Modelos necesarios para crear la ciudad -->
    <script defer src="../../modelos/ResourceTransaction.js"></script>
    <script defer src="../../modelos/Resources.js"></script>
    <script defer src="../../modelos/Score.js"></script>
    <script defer src="../../modelos/Grid.js"></script>
    <script defer src="../../modelos/Climate.js"></script>
    <script defer src="../../modelos/News.js"></script>
    <script defer src="../../modelos/City.js"></script>
    <script defer src="../../modelos/Citizen.js"></script>
    <script defer src="../../modelos/Building.js"></script>
    <script defer src="../../modelos/ResidentialBuilding.js"></script>
    <script defer src="../../modelos/CommercialBuilding.js"></script>
    <script defer src="../../modelos/IndustrialBuilding.js"></script>
    <script defer src="../../modelos/ServiceBuilding.js"></script>
    <script defer src="../../modelos/UtilityPlant.js"></script>
    <script defer src="../../modelos/Park.js"></script>
    <script defer src="../../modelos/Road.js"></script>
    <script defer src="../../modelos/Cell.js"></script>

    <!-- Acceso a datos y servicios -->
    <script defer src="../../acceso_a_datos/StorageService.js"></script>
    <script defer src="../../acceso_a_datos/ApiClimate.js"></script>
    <script defer src="../../acceso_a_datos/NewsService.js"></script>

    <!-- Controlador del panel (al final) -->
    <script defer src="../../negocio/City_panel.js"></script>

    <title>City Builder - Nueva Ciudad</title>
</head>
<body>
    <!-- Modal Cargar / Nueva partida (overlay): se muestra quitando hidden -->
    <div id="Load_new_modal"
         class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center gameover-overlay"
         hidden>
        <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-75 gameover-backdrop"></div>
        <div class="card bg-dark text-light border border-danger gameover-card">
            <div class="card-body">
                <h5 class="card-title mb-2">Partida</h5>
                <div class="small text-secondary mb-3">Se encontró una partida guardada.</div>
                <div class="d-flex gap-2">
                    <button id="btn-load-game" type="button" class="btn btn-sm btn-outline-light flex-fill">Cargar</button>
                    <button id="btn-new-game" type="button" class="btn btn-sm btn-danger flex-fill">Crear nueva partida</button>
                </div>
            </div>
        </div>
    </div>

    <div id="City_content">
        <div class="form-panel p-4 shadow">
            <h4>City Builder Game</h4>

            <label for="city-name">Nombre de la Ciudad:</label>
            <input id="city-name" class="form-control" type="text" maxlength="50">

            <label for="mayor-name">Nombre del Alcalde:</label>
            <input id="mayor-name" class="form-control" type="text" maxlength="50">

            <label for="location">Ubicación (ciudad colombiana):</label>
            <input id="location" class="form-control" type="text"
                   placeholder="Ej: Manizales, Medellín, Bogotá...">

            <label for="map-size">Tamaño del mapa</label>
            <select id="map-size" class="form-select form-select-lg mb-3">
                <option value="" selected>Seleccione un tamaño...</option>
                <option value="1">15 x 15</option>
                <option value="2">30 x 30</option>
            </select>

            <button id="btn-create-city" class="btn btn-success btn-lg mt-3" type="button">
                Crear Ciudad
            </button>
        </div>
    </div>
</body>
</html>
